<div id="avatar">
    <div id="playerFlag"></div>
</div>
<div id="playerData">
    <p id="playerName"></p>
    <div id="playerMetricsHeader" class="playerMetricsGrid">
        <span class="playerMetricsCorner"></span>
        <span class="playerMetricsHeading playerMetricsHeadingCountry">
            <span class="playerMetricsHeadingHash">#</span>
            <span class="playerMetricsHeadingIcon playerMetricsHeadingIconCountry"></span>
        </span>
        <span class="playerMetricsHeading playerMetricsHeadingWorld">
            <span class="playerMetricsHeadingHash">#</span>
            <span class="playerMetricsHeadingIcon playerMetricsHeadingIconWorld"></span>
        </span>
        <span class="playerMetricsHeading playerMetricsHeadingPP">PP.Total</span>
    </div>
    <div id="playerMetricsRowSS" class="playerMetricsGrid playerMetricsRow">
        <span class="playerMetricsLegend playerMetricsLegendSS">SS</span>
        <span id="topCountrySS" class="playerMetricsValue"></span>
        <span id="topWorldSS" class="playerMetricsValue"></span>
        <span id="performancePointSS" class="playerMetricsValue"></span>
    </div>
    <div id="playerMetricsRowBL" class="playerMetricsGrid playerMetricsRow">
        <span class="playerMetricsLegend playerMetricsLegendBL">BL</span>
        <span id="topCountryBL" class="playerMetricsValue"></span>
        <span id="topWorldBL" class="playerMetricsValue"></span>
        <span id="performancePointBL" class="playerMetricsValue"></span>
    </div>
</div>
